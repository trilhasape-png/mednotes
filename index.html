<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedNotes — Bem-vindo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --border: #e2e5ea;
    --surface: #ffffff;
    --radius: 8px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 60%, #3b82f6 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center;
    padding: 0 32px;
    justify-content: space-between;
    z-index: 100;
  }
  .nav-logo {
    font-size: 16px; font-weight: 800; letter-spacing: 2px;
    color: #fff; text-transform: uppercase;
  }
  .nav-actions { display: flex; gap: 12px; align-items: center; }
  
  .btn-nav-outline {
    padding: 8px 20px; border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: var(--radius); font-size: 13px; font-weight: 600;
    color: #fff; background: none; cursor: pointer;
    transition: all .15s; text-decoration: none;
  }
  .btn-nav-outline:hover { border-color: #fff; background: rgba(255,255,255,0.1); }

  .btn-nav-primary {
    padding: 8px 20px; border: 1.5px solid #fff;
    border-radius: var(--radius); font-size: 13px; font-weight: 600;
    color: var(--primary); background: #fff; cursor: pointer;
    transition: all .15s; text-decoration: none;
  }
  .btn-nav-primary:hover { background: #f0f4ff; transform: translateY(-1px); }

  /* ── HERO (FULL SCREEN) ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    position: relative;
  }
  
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 6px 16px;
    border-radius: 20px; margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.2);
    animation: fadeInDown 0.8s ease-out;
  }

  .hero h1 {
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 800; color: #fff;
    line-height: 1.1; margin-bottom: 20px;
    max-width: 900px;
    animation: fadeInUp 0.8s ease-out 0.2s backwards;
  }
  .hero h1 span { color: #93c5fd; }

  .hero-sub {
    font-size: clamp(16px, 2vw, 20px);
    color: rgba(255,255,255,0.8);
    max-width: 600px; margin: 0 auto 40px; line-height: 1.6;
    animation: fadeInUp 0.8s ease-out 0.4s backwards;
  }

  .hero-actions { 
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeInUp 0.8s ease-out 0.6s backwards;
  }

  .btn-main {
    padding: 16px 40px; background: #fff; color: var(--primary);
    border: none; border-radius: var(--radius); font-size: 16px;
    font-weight: 700; cursor: pointer; transition: all .2s;
    text-decoration: none; display: inline-block;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); background: #f8faff; }

  /* ── ANIMATIONS ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    .nav-logo { font-size: 14px; }
    .hero { padding-top: 64px; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">MedNotes</div>
  <div class="nav-actions">
    <a href="login.html" class="btn-nav-outline">Entrar</a>
    <a href="cadastro.html" class="btn-nav-primary">Criar conta</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="hero">
  <div class="hero-badge">🩺 Plataforma Médica</div>
  <h1>Suas anotações clínicas,<br><span>organizadas e seguras.</span></h1>
  <p class="hero-sub">O MedNotes foi criado para médicos que precisam de agilidade, organização e segurança no dia a dia clínico.</p>
  <div class="hero-actions">
    <a href="cadastro.html" class="btn-main">Começar agora — é grátis</a>
  </div>
</main>

</body>
</html>
