<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedNotes — Gerador de Quiz</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<!-- PDF.js para extração local -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --border: #e2e5ea;
    --surface: #ffffff;
    --radius: 12px;
    --bg: #f5f6f8;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 60px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 32px;
    justify-content: space-between;
    z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 24px; }
  .nav-logo { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
  .nav-menu { display: flex; gap: 20px; }
  .nav-link { text-decoration: none; font-size: 14px; font-weight: 600; color: var(--text-muted); }
  .nav-link.active { color: var(--primary); }

  /* ── CONTEÚDO ── */
  main {
    margin-top: 60px;
    padding: 40px 24px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }
  .card-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .card-subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 32px; }

  /* ── CONFIGURAÇÕES ── */
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  .config-item label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .select-box {
    width: 100%; padding: 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px; outline: none; background: #fff;
  }

  /* ── UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 24px;
    background: #fafafa;
  }
  .upload-area:hover { border-color: var(--primary); background: #f0f4ff; }
  .upload-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .upload-text { font-size: 15px; font-weight: 600; color: var(--text); }
  .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  #fileInput { display: none; }

  .file-info {
    display: none;
    align-items: center; gap: 12px;
    padding: 12px 16px; background: #f0fdf4;
    border: 1px solid #bbf7d0; border-radius: 8px;
    margin-bottom: 24px; font-size: 14px;
  }

  .btn-generate {
    width: 100%; padding: 16px; background: var(--primary);
    color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }
  .btn-generate:disabled { background: #cbd5e1; cursor: not-allowed; }

  /* ── STATUS / LOADING ── */
  #statusArea { display: none; margin-top: 24px; text-align: center; }
  .spinner {
    width: 30px; height: 30px; border: 3px solid #e2e8f0;
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg { font-size: 14px; font-weight: 600; color: var(--primary); }

  /* ── QUIZ DISPLAY ── */
  #quizDisplay { display: none; margin-top: 40px; }
  .question-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 20px;
  }
  .q-num { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
  .q-text { font-size: 16px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    padding: 14px 18px; border: 1.5px solid var(--border);
    border-radius: 8px; text-align: left; background: #fff;
    font-size: 14px; cursor: pointer; transition: all .15s;
  }
  .option-btn:hover { border-color: var(--primary); background: #f8faff; }
  .option-btn.correct { background: #dcfce7; border-color: #22c55e; color: #166534; font-weight: 700; }
  .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">MedNotes</div>
    <div class="nav-menu">
      <a href="dashboard.html" class="nav-link">Início</a>
      <a href="notas.html" class="nav-link">Notas</a>
      <a href="quiz.html" class="nav-link active">Quiz</a>
    </div>
  </div>
  <div class="nav-right">
    <a href="perfil.html" class="user-info" id="userNameNav" style="text-decoration:none; font-size:13px; font-weight:600; color:var(--text);">Carregando...</a>
  </div>
</nav>

<main>
  <div class="card" id="setupCard">
    <div class="card-title">Gerador de Quiz IA</div>
    <div class="card-subtitle">Transforme seus PDFs em questões de estudo personalizadas.</div>

    <div class="setup-grid">
      <div class="config-item">
        <label>Nível de Dificuldade</label>
        <select class="select-box" id="difficulty">
          <option value="medio">Médio (Conceitual)</option>
          <option value="dificil">Difícil (Casos Clínicos / Concursos)</option>
        </select>
      </div>
      <div class="config-item">
        <label>Quantidade de Questões</label>
        <select class="select-box" id="qAmount">
          <option value="10">10 Questões</option>
          <option value="20">20 Questões</option>
        </select>
      </div>
    </div>

    <label class="upload-area" for="fileInput" id="dropArea">
      <span class="upload-icon">📄</span>
      <span class="upload-text">Clique ou arraste o PDF aqui</span>
      <span class="upload-hint">Arquivos de qualquer tamanho (extração local)</span>
      <input type="file" id="fileInput" accept="application/pdf">
    </label>

    <div class="file-info" id="fileInfo">
      <span>✅ Arquivo selecionado: <strong id="fileName">...</strong></span>
    </div>

    <button class="btn-generate" id="generateBtn" disabled>Gerar Quiz com Gemini</button>

    <div id="statusArea">
      <div class="spinner"></div>
      <div class="status-msg" id="statusMsg">Extraindo texto do PDF...</div>
    </div>
  </div>

  <div id="quizDisplay">
    <!-- As questões aparecerão aqui -->
  </div>
</main>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const fileInput = document.getElementById('fileInput');
  const generateBtn = document.getElementById('generateBtn');
  const statusArea = document.getElementById('statusArea');
  const statusMsg = document.getElementById('statusMsg');
  let extractedText = "";

  // ── EXTRAÇÃO DE PDF E CHUNKING ──
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileInfo').style.display = 'flex';
    generateBtn.disabled = true;
    statusArea.style.display = 'block';
    statusMsg.textContent = "Extraindo texto do PDF...";

    try {
      const reader = new FileReader();
      reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = "";
        
        // Extrai texto de todas as páginas
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          fullText += content.items.map(item => item.str).join(" ") + "\n";
          statusMsg.textContent = `Lendo página ${i} de ${pdf.numPages}...`;
        }
        
        extractedText = fullText;
        statusArea.style.display = 'none';
        generateBtn.disabled = false;
      };
      reader.readAsArrayBuffer(file);
    } catch (err) {
      alert("Erro ao ler PDF: " + err.message);
      statusArea.style.display = 'none';
    }
  });

  // ── LÓGICA DO GERADOR (SIMULADA POR ENQUANTO) ──
  generateBtn.addEventListener('click', async () => {
    const difficulty = document.getElementById('difficulty').value;
    const amount = document.getElementById('qAmount').value;
    
    statusArea.style.display = 'block';
    statusMsg.textContent = "Professor Universitário analisando o material...";

    // MÉTODO DE DIVISÃO (CHUNK)
    // Se o texto for > 30.000 caracteres, pegamos a parte inicial relevante para as perguntas
    const textToProcess = extractedText.substring(0, 30000); 

    // PROMPT DA PERSONA
    const prompt = `
      Você é um Professor Universitário de Medicina renomado. 
      Sua tarefa é criar um quiz de ${amount} questões baseado no texto fornecido.
      Nível de dificuldade: ${difficulty === 'medio' ? 'MÉDIO (Conceitos fundamentais e definições)' : 'DIFÍCIL (Casos clínicos complexos e nível de concurso público)'}.
      Público: Estudantes de Medicina.
      
      Formato de resposta: JSON estritamente válido (Array de objetos com: question, options[], correctIndex).
      
      Texto base: ${textToProcess}
    `;

    console.log("Prompt enviado para o Gemini:", prompt);

    // Simulando chamada de API (aqui entra o fetch para o Gemini)
    setTimeout(() => {
      statusArea.style.display = 'none';
      document.getElementById('setupCard').style.display = 'none';
      renderQuiz(mockQuestions(amount));
    }, 3000);
  });

  function mockQuestions(n) {
    const qs = [];
    for(let i=1; i<=n; i++) {
      qs.push({
        question: `Questão Médica ${i}: Baseado no material extraído, qual a conduta correta para um paciente com os sintomas descritos?`,
        options: ["Opção A - Conduta Conservadora", "Opção B - Intervenção Cirúrgica", "Opção C - Exames Complementares", "Opção D - Observação"],
        correctIndex: 1
      });
    }
    return qs;
  }

  function renderQuiz(questions) {
    const display = document.getElementById('quizDisplay');
    display.style.display = 'block';
    display.innerHTML = '<h2 style="margin-bottom:24px; text-align:center;">Seu Quiz Personalizado</h2>';
    
    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="q-num">Questão ${i+1}</div>
        <div class="q-text">${q.question}</div>
        <div class="options-list">
          ${q.options.map((opt, idx) => `<button class="option-btn" onclick="checkAnswer(this, ${idx}, ${q.correctIndex})">${opt}</button>`).join('')}
        </div>
      `;
      display.appendChild(card);
    });
  }

  window.checkAnswer = (btn, selected, correct) => {
    const parent = btn.parentElement;
    const btns = parent.querySelectorAll('.option-btn');
    btns.forEach(b => b.style.pointerEvents = 'none');
    
    if (selected === correct) {
      btn.classList.add('correct');
    } else {
      btn.classList.add('wrong');
      btns[correct].classList.add('correct');
    }
  };

  // Nome do usuário
  (function() {
    const sessionData = localStorage.getItem('mednotes_session');
    if (sessionData) {
      const user = JSON.parse(sessionData);
      document.getElementById('userNameNav').textContent = user.name;
    }
  })();
</script>

</body>
</html>
